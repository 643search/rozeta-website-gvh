<body>

<div id="nav-placeholder" style="position:sticky;top:0;z-index:1000;"></div>

<!-- ── HERO ─────────────────────────────────────────────────────── -->
<section class="page-hero" style="background:#fff;">
  <div class="container">
    <div class="label reveal">Community</div>
    <h1 class="reveal reveal-delay-1">Book Discovery Call</h1>
  </div>
</section>

<!-- ── FORM SECTION ──────────────────────────────────────────────── -->
<section class="section" style="padding-top:var(--space-2);">
  <div class="container">
    <div class="card" style="max-width:760px;margin:0 auto;padding:var(--space-8);">
      <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:var(--space-6);">Your Information</h2>

      <iframe
        src="https://api.leadconnectorhq.com/widget/booking/UcVlB6Hy9bT2XJpOCFlH"
        style="width: 100%;border:none;overflow: hidden;"
        scrolling="no"
        id="UcVlB6Hy9bT2XJpOCFlH_1772148912639"
        title="booking"
      ></iframe>
      <br>
      <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>

    </div>
  </div>
</section>

<!-- ── SMS CONSENT ───────────────────────────────────────────────── -->
<section class="section" style="padding-top:var(--space-6);padding-bottom:var(--space-16);">
  <div class="container">
    <div style="max-width:760px;margin:0 auto;background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-8);">

      <div class="label" style="margin-bottom:var(--space-6);">SMS Communications</div>

      <!-- Checkbox 1: Transactional -->
      <div style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:var(--space-5);">
        <input
          type="checkbox"
          id="sms-transactional"
          name="sms-transactional"
          style="margin-top:3px;width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--color-accent);"
        >
        <label for="sms-transactional" style="font-size:0.875rem;color:var(--color-text-secondary);line-height:1.6;cursor:pointer;">
          By checking this box, I consent to receive conversational (customer care) and transactional (appointment/reminder) text messages from <strong>Rozeta Labs</strong> such as booking confirmations, training reminders, account notifications, and support communications related to your services. Message frequency varies, message &amp; data rates may apply. Text HELP for assistance, reply STOP to opt out.
        </label>
      </div>

      <!-- Checkbox 2: Marketing -->
      <div style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:var(--space-5);">
        <input
          type="checkbox"
          id="sms-marketing"
          name="sms-marketing"
          style="margin-top:3px;width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--color-accent);"
        >
        <label for="sms-marketing" style="font-size:0.875rem;color:var(--color-text-secondary);line-height:1.6;cursor:pointer;">
          By checking this box, I consent to receive marketing/promotional text messages including special offers, discounts, and new product updates from <strong>Rozeta Labs</strong> at the phone number provided. Frequency may vary. Message &amp; data rates may apply. Text HELP for assistance, reply STOP to opt out.
        </label>
      </div>

      <p style="font-size:0.8rem;color:var(--color-text-secondary);opacity:0.75;margin:0 0 var(--space-4);">
        SMS consent is optional and is not required to submit.
      </p>

      <p style="font-size:0.8rem;margin:0;text-align:center;">
        <a href="privacy-policy.html" style="color:var(--color-accent);text-decoration:underline;">Privacy Policy</a>
        &nbsp;&middot;&nbsp;
        <a href="terms-of-service.html" style="color:var(--color-accent);text-decoration:underline;">Terms of Service</a>
      </p>

    </div>
  </div>
</section>

<!-- ── FOOTER ─────────────────────────────────────────────────────── -->
