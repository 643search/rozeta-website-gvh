<!-- ── HERO ─────────────────────────────────────────────────────── -->
<section class="page-hero" style="background:#fff;">
  <div class="container">
    <div class="label reveal">Consulting</div>
    <h1 class="reveal reveal-delay-1">Hire a Consultant</h1>
    <p class="reveal reveal-delay-2" style="max-width:580px;margin:var(--space-4) auto 0;font-size:1.125rem;color:var(--color-text-secondary);text-align:center;line-height:1.7;">
      Book a time for us to connect to map out exactly where AI can drive the most impact in your organization.
    </p>
  </div>
</section>

<!-- ── BOOKING SECTION ───────────────────────────────────────────── -->
<section class="section" style="padding-top:var(--space-12);">
  <div class="container">
    <div class="card" style="padding:var(--space-8);max-width:760px;margin:0 auto;">

      <!-- GHL Calendar Embed -->
      <iframe
        src="https://api.leadconnectorhq.com/widget/booking/1dqdBBDuvcyPiGDQ3jnM"
        style="width:100%;min-height:700px;border:none;overflow:hidden;"
        scrolling="no"
        id="1dqdBBDuvcyPiGDQ3jnM_1771952220765"
      ></iframe>

    </div>
  </div>
</section>

<!-- ── SMS CONSENT ───────────────────────────────────────────────── -->
<section class="section" style="padding-top:var(--space-6);padding-bottom:var(--space-16);">
  <div class="container">
    <div style="background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-8);max-width:760px;margin:0 auto;">

      <div class="label" style="margin-bottom:var(--space-6);">SMS Communications</div>

      <!-- Checkbox 1: Transactional -->
      <div style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:var(--space-5);">
        <input
          type="checkbox"
          id="sms-transactional"
          name="sms-transactional"
          style="margin-top:3px;width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--color-accent);"
        >
        <label for="sms-transactional" style="font-size:0.875rem;color:var(--color-text-secondary);line-height:1.6;cursor:pointer;">
          By checking this box, I consent to receive non-marketing text messages from <strong>Rozeta Labs</strong> such as booking confirmations, training reminders, account notifications, and support communications related to your community membership or consulting services. Message frequency varies, message &amp; data rates may apply. Text HELP for assistance, reply STOP to opt out.
        </label>
      </div>

      <!-- Checkbox 2: Marketing -->
      <div style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:var(--space-5);">
        <input
          type="checkbox"
          id="sms-marketing"
          name="sms-marketing"
          style="margin-top:3px;width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--color-accent);"
        >
        <label for="sms-marketing" style="font-size:0.875rem;color:var(--color-text-secondary);line-height:1.6;cursor:pointer;">
          By checking this box, I consent to receive marketing and promotional messages including special offers, discounts, new product updates among others from <strong>Rozeta Labs</strong> at the phone number provided. Frequency may vary. Message &amp; data rates may apply. Text HELP for assistance, reply STOP to opt out.
        </label>
      </div>

      <p style="font-size:0.8rem;color:var(--color-text-secondary);opacity:0.75;margin:0 0 var(--space-4);">
        SMS consent is optional and is not required to submit.
      </p>

      <p style="font-size:0.8rem;margin:0;text-align:center;">
        <a href="privacy-policy.html" style="color:var(--color-accent);text-decoration:underline;">Privacy Policy</a>
        &nbsp;&middot;&nbsp;
        <a href="terms-of-service.html" style="color:var(--color-accent);text-decoration:underline;">Terms of Service</a>
      </p>

    </div>
  </div>
</section>
