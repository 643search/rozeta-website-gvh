<!-- ── HERO ─────────────────────────────────────────────────────── -->
<section class="page-hero" style="background:#fff;">
  <div class="container">
    <div class="label reveal">Contact</div>
    <h1 class="reveal reveal-delay-1">Get in Touch</h1>
    <p class="reveal reveal-delay-2" style="max-width:560px;margin:var(--space-4) auto 0;font-size:1.125rem;color:var(--color-text-secondary);text-align:center;line-height:1.7;">
      Have a question? Want to learn more about what we do? Reach out — we respond to every message.
    </p>
  </div>
</section>

<!-- ── CONTACT DETAILS ───────────────────────────────────────────── -->
<section class="section" style="padding-top:var(--space-12);padding-bottom:var(--space-16);">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-8);max-width:900px;margin:0 auto;align-items:start;">

      <!-- Left: Contact info -->
      <div class="reveal">
        <h2 style="font-size:1.5rem;font-weight:600;margin-bottom:var(--space-6);">Contact Information</h2>

        <!-- Email -->
        <div style="display:flex;align-items:flex-start;gap:var(--space-4);margin-bottom:var(--space-6);">
          <div style="width:40px;height:40px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <div>
            <div style="font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px;">Email</div>
            <a href="mailto:hey@rozetalabs.com" style="font-size:1rem;color:var(--color-text-primary);font-weight:500;text-decoration:none;">hey@rozetalabs.com</a>
          </div>
        </div>

        <!-- Phone -->
        <div style="display:flex;align-items:flex-start;gap:var(--space-4);margin-bottom:var(--space-6);">
          <div style="width:40px;height:40px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <div style="font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px;">Phone</div>
            <a href="tel:+14846447402" style="font-size:1rem;color:var(--color-text-primary);font-weight:500;text-decoration:none;">(484) 644-7402</a>
          </div>
        </div>

<!-- Hours -->
        <div style="display:flex;align-items:flex-start;gap:var(--space-4);">
          <div style="width:40px;height:40px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div>
            <div style="font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px;">Office Hours</div>
            <div style="font-size:1rem;color:var(--color-text-primary);font-weight:500;line-height:1.5;">Mon – Fri, 9am – 5pm CT</div>
          </div>
        </div>
      </div>

      <!-- Right: GHL Contact Form -->
      <div class="reveal reveal-delay-1">
        <h2 style="font-size:1.5rem;font-weight:600;margin-bottom:var(--space-6);">Ready to Get Started?</h2>
        <iframe
          src="https://api.leadconnectorhq.com/widget/form/0nVBoe93ZDiLgPYcoNXJ"
          style="width:100%;height:870px;border:none;border-radius:3px;"
          id="inline-0nVBoe93ZDiLgPYcoNXJ"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Rozeta Contact Us Form"
          data-height="870"
          data-layout-iframe-id="inline-0nVBoe93ZDiLgPYcoNXJ"
          data-form-id="0nVBoe93ZDiLgPYcoNXJ"
          title="Rozeta Contact Us Form"
        ></iframe>
        <script src="https://link.msgsndr.com/js/form_embed.js"></script>
      </div>

    </div>
